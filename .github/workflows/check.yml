name: Nuna stock check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python check_nuna.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
